groups:
- name: ServiceAlerts
  rules:
  - alert: HighCpuUsage
    expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 5
    for: 1m
    labels:
      severity: warning
      team: infra
    annotations:
      summary: "High CPU usage detected on {{ $labels.instance }}"
      description: "CPU utilization is over 5% on {{ $labels.instance }}. Auto-remediation triggered."

  - alert: NodeExporterDown
    expr: up{job="node-exporter"} == 0
    for: 1m
    labels:
      severity: critical
      team: infra
    annotations:
      summary: "Node Exporter is down"
      description: "Node Exporter instance {{ $labels.instance }} is not responding. Service healing required."

  - alert: HighDiskUsage
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
    for: 1m
    labels:
      severity: warning
      team: infra
    annotations:
      summary: "Disk usage above 90% on {{ $labels.instance }}"
      description: "Available disk space is below 10% on {{ $labels.instance }}. Cleanup triggered."

  - alert: HighMemoryUsage
    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
    for: 1m
    labels:
      severity: warning
      team: infra
    annotations:
      summary: "Memory usage above 90% on {{ $labels.instance }}"
      description: "Available memory is below 10% on {{ $labels.instance }}. Service restart triggered."

